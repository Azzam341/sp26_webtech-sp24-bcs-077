<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-light p-3">
        <ul class="list-unstyled d-flex align-items-center gap-3 m-0">
            <li><h1 class="m-0">Logo</h1></li>
            <li class="flex-grow-1">
                <input type="text" class="form-control" placeholder="Search">
            </li>
            <li><button class="btn btn-outline-primary">Search</button></li>
            <li><button class="btn btn-outline-secondary">Customer Service</button></li>
            <li><button class="btn btn-outline-secondary">My Account</button></li>
            <li><button class="btn btn-outline-success">Cart</button></li>
        </ul>
    </header>

    <section id="options-pane" class="bg-light py-2">
    <div class="container d-flex align-items-center gap-4">
        
        <div id="categories-button">
            <button class="btn btn-dark">Categories</button>
        </div>

        <ul class="list-unstyled d-flex gap-3 m-0">
            <li><button class="btn btn-outline-secondary">Home</button></li>
            <li><button class="btn btn-outline-secondary">Deals</button></li>
            <li><button class="btn btn-outline-secondary">Featured</button></li>
            <li><button class="btn btn-outline-secondary">New Arrival</button></li>
            <li><button class="btn btn-outline-secondary">Best Seller</button></li>
            <li><button class="btn btn-outline-secondary">Most Viewed</button></li>
        </ul>
        </div>
    </section>

    <section id="banners">
        <img src="../Website Assets/asus_rog_zephyrus_g16_size_2.jpg" alt="">
        <div>
            <p class="banner-para">100% Geniune Products</p>
            <p class="banner-para">Discounts Offered Every Day</p>
            <p class="banner-para">Free Shipping</p>
        </div>
    </section>
    
    <section id="deals" class="py-4">
        <div class="container">
            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <p class="text-danger fw-bold mb-2">Deal Ending Soon</p>
                    <img src="../Website Assets/apple_mac_mini_2024_2_-_tejar.jpg"
                        class="img-fluid mb-3"
                        alt="Apple Mac Mini">
                    <h5 class="card-title">Apple Mac Mini</h5>
                    <p class="card-text">
                        <span class="text-muted text-decoration-line-through">
                            PKR 222,999
                        </span>
                        <br>
                        <span class="fw-bold text-success">
                            PKR 199,999
                        </span>
                    </p>
                    <button class="btn btn-primary w-100">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <p class="text-danger fw-bold mb-2">Deal Ending Soon</p>
                    <img src="../Website Assets/apple_11__ipad_a16_chip_11th_gen_10_-_tejar_3.jpg"
                        class="img-fluid mb-3"
                        alt="Apple iPad">
                    <h5 class="card-title">Apple 11 ipad</h5>
                    <p class="card-text">
                        <span class="text-muted text-decoration-line-through">
                            PKR 222,999
                        </span>
                        <br>
                        <span class="fw-bold text-success">
                            PKR 199,999
                        </span>
                    </p>
                    <button class="btn btn-primary w-100">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="category-icons" style="display: flex;">
        <div class="card-body d-flex flex-column align-items-center" style="background-color: white;">
            <img src="../Website Assets/audio-icon.jpg"
                class="img-fluid mb-3"
                alt="Audio icon">
            <h5 class="card-title">Audio</h5>
        </div>

        <div class="card-body d-flex flex-column align-items-center">
            <img src="../Website Assets/games-icon.jpg"
                class="img-fluid mb-3"
                alt="Game icon">
            <h5 class="card-title">Games and Accessories</h5>
        </div>
    </section>

    <section id="drones"></section>
    <section id="featured"></section>
    <section id="featured-brands"></section>
    <section id="info"></section>
    <footer></footer>

</body>
</html>
